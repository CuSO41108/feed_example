services:
  mysql:
    image: mysql:8.4
    container_name: friend-zone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: friend_zone
      MYSQL_USER: friend_zone
      MYSQL_PASSWORD: friend_zone
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ufriend_zone -pfriend_zone --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    container_name: friend-zone-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  kafka:
    image: apache/kafka:3.7.0
    container_name: friend-zone-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: friend-zone-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic post.published --partitions 1 --replication-factor 1 &&
       /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic post.deleted --partitions 1 --replication-factor 1 &&
       /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic feed.fanout.chunk --partitions 1 --replication-factor 1 &&
       /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic feed.fanout.chunk.retry --partitions 1 --replication-factor 1 &&
       /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic feed.fanout.chunk.dlq --partitions 1 --replication-factor 1"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: friend-zone-kafka-ui
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  api:
    build:
      context: .
    container_name: friend-zone-api
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      APP_ENV: docker
      HTTP_ADDR: ":8080"
      MYSQL_DSN: "friend_zone:friend_zone@tcp(mysql:3306)/friend_zone?parseTime=true&loc=UTC&charset=utf8mb4,utf8"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      JWT_SECRET: "change-me-in-real-env"
      BIG_V_THRESHOLD: "10000"
      REDIS_INBOX_LIMIT: "1000"
    command: ["/app/api"]

  worker:
    build:
      context: .
    container_name: friend-zone-worker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: docker
      MYSQL_DSN: "friend_zone:friend_zone@tcp(mysql:3306)/friend_zone?parseTime=true&loc=UTC&charset=utf8mb4,utf8"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      JWT_SECRET: "change-me-in-real-env"
      BIG_V_THRESHOLD: "10000"
      REDIS_INBOX_LIMIT: "1000"
    command: ["/app/worker"]

volumes:
  mysql_data:
